<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YES24 티켓팅 연습 시뮬레이터</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 커스텀 폰트 및 애니메이션 설정 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
        .captcha-text {
            transform: rotate(1deg) skewX(6deg);
            mix-blend-mode: multiply;
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-short {
            animation: bounce-short 1s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex items-center justify-center">

    <!-- App Container -->
    <div id="app" class="w-full max-w-5xl h-[700px] bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200 flex flex-col relative">
        
        <!-- STEP 1: HOME -->
        <div id="step-home" class="flex flex-col items-center justify-center h-full space-y-8 bg-blue-50/50 p-8 step-section">
            <div class="text-center space-y-4">
                <div class="flex items-center justify-center space-x-3 mb-6 text-blue-600">
                    <i data-lucide="ticket" class="w-12 h-12"></i>
                    <h1 class="text-4xl font-bold tracking-tighter">YES24 티켓팅 연습</h1>
                </div>
                <p class="text-gray-600 text-lg">실제 예매 환경과 유사한 시뮬레이터로 포도알 잡기를 연습하세요.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-3xl mt-8">
                <button onclick="startGame('EASY')" class="flex flex-col items-center p-6 border-2 rounded-2xl transition-all duration-200 group bg-green-100 text-green-700 hover:bg-green-200 border-green-300">
                    <i data-lucide="play" class="w-10 h-10 mb-3 opacity-80 group-hover:scale-110 transition-transform"></i>
                    <h3 class="text-xl font-bold mb-2">순한맛 (연습용)</h3>
                    <p class="text-sm text-center opacity-80 font-medium">경쟁자가 적고 여유로운 환경</p>
                </button>
                <button onclick="startGame('NORMAL')" class="flex flex-col items-center p-6 border-2 rounded-2xl transition-all duration-200 group bg-blue-100 text-blue-700 hover:bg-blue-200 border-blue-300">
                    <i data-lucide="play" class="w-10 h-10 mb-3 opacity-80 group-hover:scale-110 transition-transform"></i>
                    <h3 class="text-xl font-bold mb-2">보통맛 (실전)</h3>
                    <p class="text-sm text-center opacity-80 font-medium">일반적인 아이돌 콘서트 수준</p>
                </button>
                <button onclick="startGame('HARD')" class="flex flex-col items-center p-6 border-2 rounded-2xl transition-all duration-200 group bg-red-100 text-red-700 hover:bg-red-200 border-red-300">
                    <i data-lucide="play" class="w-10 h-10 mb-3 opacity-80 group-hover:scale-110 transition-transform"></i>
                    <h3 class="text-xl font-bold mb-2">매운맛 (피켓팅)</h3>
                    <p class="text-sm text-center opacity-80 font-medium">임영웅, BTS급 0.1초 컷 지옥</p>
                </button>
            </div>
        </div>

        <!-- STEP 2: DATETIME -->
        <div id="step-datetime" class="hidden flex-col h-full bg-white step-section">
            <div class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
                <h2 class="text-xl font-bold">관람일/회차 선택</h2>
                <div class="timer-display font-mono text-xl bg-black/20 px-3 py-1 rounded">00:00.00</div>
            </div>
            
            <div class="flex flex-1 p-6 gap-6 h-[500px]">
                <div class="flex-1 border border-gray-300 rounded-lg flex flex-col">
                    <div class="bg-gray-100 px-4 py-2 font-bold border-b border-gray-300 text-center">2026년 8월</div>
                    <div id="calendar-grid" class="p-4 grid grid-cols-7 gap-2 text-center text-sm flex-1">
                        <!-- Calendar injected by JS -->
                    </div>
                </div>

                <div class="w-80 flex flex-col gap-4">
                    <div class="border border-gray-300 rounded-lg flex flex-col h-1/2">
                        <div class="bg-gray-100 px-4 py-2 font-bold border-b border-gray-300">회차 선택</div>
                        <div class="p-4 flex flex-col gap-2">
                            <button id="time-btn" onclick="selectTime('18:00')" class="p-3 border rounded text-left border-gray-300 hover:bg-gray-50">
                                1회차 18:00
                            </button>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col justify-end">
                        <button onclick="goToCaptcha()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg text-lg hover:bg-blue-700 transition-colors shadow-lg active:scale-[0.98]">
                            예매하기
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- STEP 3: CAPTCHA -->
        <div id="step-captcha" class="hidden flex-col h-full bg-white relative step-section">
            <div class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
                <h2 class="text-xl font-bold">안심예매</h2>
                <div class="timer-display font-mono text-xl bg-black/20 px-3 py-1 rounded">00:00.00</div>
            </div>

            <div class="flex-1 flex items-center justify-center bg-gray-50 p-6">
                <div class="bg-white p-8 rounded-xl shadow-2xl border border-gray-200 max-w-md w-full text-center">
                    <div class="bg-blue-50 text-blue-800 p-4 rounded-lg mb-6 text-sm font-medium">
                        부정예매 방지를 위해 아래 문자를 입력해주세요.
                    </div>
                    <div class="bg-gray-100 border-2 border-gray-300 rounded-lg p-6 mb-6 relative overflow-hidden select-none">
                        <div id="captcha-text-display" class="captcha-text font-mono text-5xl font-black tracking-widest text-gray-800">
                            <!-- Text injected here -->
                        </div>
                        <div class="absolute inset-0 pointer-events-none opacity-30">
                            <svg width="100%" height="100%">
                                <line x1="0" y1="20" x2="100%" y2="80" stroke="black" stroke-width="2" />
                                <line x1="0" y1="80" x2="100%" y2="20" stroke="black" stroke-width="2" />
                            </svg>
                        </div>
                    </div>
                    <form id="captcha-form" onsubmit="submitCaptcha(event)" class="space-y-4">
                        <input type="text" id="captcha-input" placeholder="보이는 문자를 입력하세요" autocomplete="off"
                            class="w-full p-4 border-2 rounded-lg text-center text-xl font-bold uppercase tracking-widest focus:outline-none focus:ring-4 border-gray-300 focus:border-blue-500 focus:ring-blue-100">
                        <p id="captcha-error" class="hidden text-red-500 text-sm font-bold">문자가 일치하지 않습니다. 다시 입력해주세요.</p>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg text-lg hover:bg-blue-700 transition-colors shadow-md">
                            입력완료
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- STEP 4: SEAT MAP -->
        <div id="step-seat" class="hidden flex-col h-full bg-white select-none step-section">
            <div class="bg-blue-600 text-white px-6 py-3 flex justify-between items-center shrink-0">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="mouse-pointer-click" class="w-5 h-5"></i> 좌석 선택
                </h2>
                <div class="timer-display font-mono text-xl bg-black/20 px-3 py-1 rounded text-yellow-300 font-bold tracking-wider">00:00.00</div>
            </div>

            <div class="flex flex-1 overflow-hidden">
                <div class="flex-1 bg-[#eef1f5] overflow-auto flex flex-col items-center justify-start p-8 relative">
                    <div class="w-[600px] h-16 bg-gray-400 rounded-b-3xl mb-12 flex items-center justify-center text-white font-bold text-2xl shadow-inner uppercase tracking-widest">
                        STAGE
                    </div>
                    <div id="seat-grid" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <!-- Seats injected by JS -->
                    </div>
                </div>

                <div class="w-80 bg-white border-l border-gray-300 flex flex-col shrink-0">
                    <div class="p-4 border-b border-gray-200">
                        <h3 class="font-bold text-lg mb-3">좌석 등급</h3>
                        <div id="grade-legend" class="space-y-2">
                            <!-- Legend injected by JS -->
                        </div>
                    </div>
                    <div class="flex-1 p-4 flex flex-col">
                        <h3 class="font-bold text-lg mb-3">선택된 좌석</h3>
                        <div class="flex-1 bg-gray-50 border border-gray-200 rounded-lg p-4 flex flex-col items-center justify-center">
                            <div id="selected-seat-info" class="w-full h-full flex items-center justify-center">
                                <div class="text-gray-400 text-center text-sm font-medium">
                                    좌석을 선택해주세요<br/>(최대 1석)
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 bg-gray-50 border-t border-gray-200">
                        <button id="book-btn" onclick="bookSeat()" class="w-full py-4 rounded-lg text-lg font-bold transition-colors shadow-md bg-gray-300 text-gray-500 cursor-not-allowed" disabled>
                            좌석선택완료
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- STEP 5: SUCCESS -->
        <div id="step-success" class="hidden flex-col items-center justify-center h-full bg-blue-50/50 p-8 step-section">
            <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-md w-full transform animate-bounce-short">
                <i data-lucide="check-circle-2" class="w-24 h-24 text-green-500 mx-auto mb-6"></i>
                <h2 class="text-3xl font-black text-gray-800 mb-2">예매 성공!</h2>
                <p class="text-gray-500 mb-8 font-medium">치열한 피켓팅을 뚫고 포도알을 잡았습니다.</p>
                
                <div class="bg-blue-50 rounded-xl p-6 mb-8 border border-blue-100">
                    <div class="text-sm text-blue-600 font-bold mb-1">소요 시간</div>
                    <div id="final-time" class="text-4xl font-mono font-black text-blue-800 tracking-wider">00:00.00</div>
                    <div id="final-difficulty" class="text-sm text-gray-500 mt-4 font-medium">난이도 : 보통맛</div>
                </div>

                <button onclick="resetApp()" class="w-full flex items-center justify-center gap-2 bg-gray-800 text-white font-bold py-4 rounded-lg hover:bg-gray-900 transition-colors">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i> 다시 연습하기
                </button>
            </div>
        </div>

        <!-- MODAL (이선좌 등) -->
        <div id="modal" class="hidden absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full overflow-hidden transform scale-100 transition-transform">
                <div class="bg-red-500 p-4 flex justify-between items-center text-white">
                    <div class="flex items-center gap-2 font-bold text-lg">
                        <i data-lucide="alert-circle" class="w-6 h-6"></i> 알림
                    </div>
                    <button onclick="closeModal()" class="hover:bg-red-600 p-1 rounded transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="modal-message" class="p-8 text-center text-gray-800 font-bold text-lg whitespace-pre-line leading-relaxed">
                    <!-- Message here -->
                </div>
                <div class="p-4 bg-gray-50 border-t border-gray-100">
                    <button onclick="closeModal()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                        확인
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- Constants ---
        const ROWS = 15;
        const COLS = 25;
        const GRADES = {
            VIP: { name: 'VIP석', colorClass: 'bg-purple-600', hoverClass: 'hover:bg-purple-500', price: '154,000원', rows: [0, 1, 2, 3] },
            R: { name: 'R석', colorClass: 'bg-green-500', hoverClass: 'hover:bg-green-400', price: '132,000원', rows: [4, 5, 6, 7] },
            S: { name: 'S석', colorClass: 'bg-blue-500', hoverClass: 'hover:bg-blue-400', price: '110,000원', rows: [8, 9, 10, 11] },
            A: { name: 'A석', colorClass: 'bg-orange-500', hoverClass: 'hover:bg-orange-400', price: '99,000원', rows: [12, 13, 14] }
        };
        const TARGET_DATES = [15, 16];

        // --- State ---
        let state = {
            step: 'step-home',
            startTime: null,
            elapsedTime: 0,
            timerInterval: null,
            botInterval: null,
            difficulty: 'NORMAL',
            selectedDate: null,
            selectedTime: null,
            captchaText: '',
            seats: [], // Array of { id, row, col, grade, status }
            selectedSeatId: null
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderCalendar();
            renderGradeLegend();
        });

        // --- Navigation ---
        function switchStep(stepId) {
            document.querySelectorAll('.step-section').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.step-section').forEach(el => el.classList.remove('flex'));
            
            const target = document.getElementById(stepId);
            target.classList.remove('hidden');
            target.classList.add('flex');
            state.step = stepId;
            
            if (stepId === 'step-captcha') {
                document.getElementById('captcha-input').focus();
            }
        }

        function showModal(msg) {
            document.getElementById('modal-message').innerText = msg;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // --- Timers ---
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const milliseconds = Math.floor((ms % 1000) / 10);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(milliseconds).padStart(2, '0')}`;
        }

        function updateTimerDisplays() {
            const timeStr = formatTime(state.elapsedTime);
            document.querySelectorAll('.timer-display').forEach(el => {
                el.innerText = timeStr;
            });
        }

        function startGlobalTimer() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.startTime = Date.now();
            state.timerInterval = setInterval(() => {
                state.elapsedTime = Date.now() - state.startTime;
                updateTimerDisplays();
            }, 10);
        }

        function stopGlobalTimer() {
            if (state.timerInterval) clearInterval(state.timerInterval);
        }

        // --- Step: Home ---
        function startGame(difficulty) {
            state.difficulty = difficulty;
            state.selectedDate = null;
            state.selectedTime = null;
            updateCalendarSelection();
            updateTimeSelection();
            
            startGlobalTimer();
            switchStep('step-datetime');
        }

        // --- Step: DateTime ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            ['일', '월', '화', '수', '목', '금', '토'].forEach(d => {
                grid.innerHTML += `<div class="font-bold text-gray-500 pb-2">${d}</div>`;
            });
            
            for (let i = 1; i <= 31; i++) {
                const isTarget = TARGET_DATES.includes(i);
                const btn = document.createElement('button');
                btn.id = `cal-date-${i}`;
                btn.innerText = i;
                
                let baseClasses = "h-10 w-10 mx-auto rounded-full flex items-center justify-center font-medium transition-colors ";
                
                if (!isTarget) {
                    btn.className = baseClasses + "text-gray-300 cursor-not-allowed";
                    btn.disabled = true;
                } else {
                    btn.className = baseClasses + "text-black hover:bg-blue-100 cursor-pointer";
                    btn.onclick = () => selectDate(i);
                }
                grid.appendChild(btn);
            }
        }

        function selectDate(day) {
            state.selectedDate = day;
            updateCalendarSelection();
        }

        function updateCalendarSelection() {
            for (let i = 1; i <= 31; i++) {
                const btn = document.getElementById(`cal-date-${i}`);
                if (!btn) continue;
                
                if (TARGET_DATES.includes(i)) {
                    if (state.selectedDate === i) {
                        btn.className = "h-10 w-10 mx-auto rounded-full flex items-center justify-center font-medium bg-blue-600 text-white shadow-md";
                    } else {
                        btn.className = "h-10 w-10 mx-auto rounded-full flex items-center justify-center font-medium text-black hover:bg-blue-100 cursor-pointer";
                    }
                }
            }
        }

        function selectTime(time) {
            state.selectedTime = time;
            updateTimeSelection();
        }

        function updateTimeSelection() {
            const btn = document.getElementById('time-btn');
            if (state.selectedTime) {
                btn.className = "p-3 border rounded text-left border-blue-600 bg-blue-50 text-blue-700 font-bold";
            } else {
                btn.className = "p-3 border rounded text-left border-gray-300 hover:bg-gray-50";
            }
        }

        function goToCaptcha() {
            if (!state.selectedDate || !state.selectedTime) {
                showModal("관람일과 회차를 모두 선택해주세요.");
                return;
            }
            generateCaptcha();
            switchStep('step-captcha');
        }

        // --- Step: Captcha ---
        function generateCaptcha() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            state.captchaText = result;
            document.getElementById('captcha-text-display').innerText = result;
            document.getElementById('captcha-input').value = '';
            document.getElementById('captcha-input').classList.remove('border-red-500', 'bg-red-50');
            document.getElementById('captcha-input').classList.add('border-gray-300');
            document.getElementById('captcha-error').classList.add('hidden');
        }

        function submitCaptcha(e) {
            e.preventDefault();
            const input = document.getElementById('captcha-input').value.toUpperCase();
            if (input === state.captchaText) {
                initSeats();
                switchStep('step-seat');
                startBots();
            } else {
                document.getElementById('captcha-input').classList.add('border-red-500', 'bg-red-50');
                document.getElementById('captcha-input').classList.remove('border-gray-300');
                document.getElementById('captcha-error').classList.remove('hidden');
                generateCaptcha();
            }
        }

        // --- Step: Seat Map ---
        function renderGradeLegend() {
            const container = document.getElementById('grade-legend');
            container.innerHTML = '';
            Object.values(GRADES).forEach(info => {
                container.innerHTML += `
                    <div class="flex justify-between items-center text-sm">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-sm ${info.colorClass}"></div>
                            <span class="font-medium text-gray-700">${info.name}</span>
                        </div>
                        <span class="font-bold">${info.price}</span>
                    </div>
                `;
            });
        }

        function initSeats() {
            state.seats = [];
            state.selectedSeatId = null;
            const container = document.getElementById('seat-grid');
            container.innerHTML = '';

            for (let r = 0; r < ROWS; r++) {
                const rowChar = String.fromCharCode(65 + r);
                let gradeKey = 'A';
                if (GRADES.VIP.rows.includes(r)) gradeKey = 'VIP';
                else if (GRADES.R.rows.includes(r)) gradeKey = 'R';
                else if (GRADES.S.rows.includes(r)) gradeKey = 'S';

                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex items-center mb-1';
                rowDiv.innerHTML = `<div class="w-6 text-xs font-bold text-gray-400 text-center mr-2">${rowChar}</div>`;
                
                const seatsDiv = document.createElement('div');
                seatsDiv.className = 'flex gap-1';

                for (let c = 0; c < COLS; c++) {
                    const isPreTaken = Math.random() > 0.8;
                    const seat = {
                        id: `${r}-${c}`,
                        row: rowChar,
                        col: c + 1,
                        grade: gradeKey,
                        status: isPreTaken ? 'TAKEN' : 'AVAILABLE'
                    };
                    state.seats.push(seat);

                    const btn = document.createElement('button');
                    btn.id = `seat-${seat.id}`;
                    btn.title = `${seat.row}열 ${seat.col}번`;
                    btn.onclick = () => handleSeatClick(seat.id);
                    seatsDiv.appendChild(btn);
                }
                rowDiv.appendChild(seatsDiv);
                container.appendChild(rowDiv);
            }
            refreshAllSeatClasses();
            updateSelectedSeatUI();
        }

        function getSeatClasses(seat) {
            const base = "w-[14px] h-[14px] rounded-[3px] transition-all duration-75 ";
            const isTaken = seat.status === 'TAKEN';
            const isSelected = state.selectedSeatId === seat.id;
            const gradeInfo = GRADES[seat.grade];

            if (isTaken) {
                return base + "bg-gray-200 cursor-not-allowed opacity-50";
            }
            if (isSelected) {
                return base + "bg-black scale-125 ring-2 ring-black ring-offset-1 z-10 relative";
            }
            return base + `${gradeInfo.colorClass} cursor-pointer ${gradeInfo.hoverClass}`;
        }

        function refreshAllSeatClasses() {
            state.seats.forEach(seat => {
                const el = document.getElementById(`seat-${seat.id}`);
                if (el) el.className = getSeatClasses(seat);
            });
        }

        function updateSingleSeatClass(seatId) {
            const seat = state.seats.find(s => s.id === seatId);
            if (!seat) return;
            const el = document.getElementById(`seat-${seatId}`);
            if (el) el.className = getSeatClasses(seat);
        }

        function handleSeatClick(seatId) {
            const seat = state.seats.find(s => s.id === seatId);
            if (seat.status === 'TAKEN') {
                showModal("이미 선택된 좌석입니다.");
                return;
            }
            
            const prevSelectedId = state.selectedSeatId;
            state.selectedSeatId = seatId;

            if (prevSelectedId) updateSingleSeatClass(prevSelectedId);
            updateSingleSeatClass(seatId);
            
            updateSelectedSeatUI();
        }

        function updateSelectedSeatUI() {
            const container = document.getElementById('selected-seat-info');
            const bookBtn = document.getElementById('book-btn');
            
            if (state.selectedSeatId) {
                const seat = state.seats.find(s => s.id === state.selectedSeatId);
                const gradeInfo = GRADES[seat.grade];
                
                container.innerHTML = `
                    <div class="text-center space-y-2">
                        <div class="inline-block px-3 py-1 text-white text-sm font-bold rounded ${gradeInfo.colorClass}">
                            ${gradeInfo.name}
                        </div>
                        <div class="text-2xl font-black text-gray-800">
                            ${seat.row}열 ${seat.col}번
                        </div>
                        <div class="text-gray-500 font-medium">
                            ${gradeInfo.price}
                        </div>
                    </div>
                `;
                
                bookBtn.className = "w-full py-4 rounded-lg text-lg font-bold transition-colors shadow-md bg-blue-600 text-white hover:bg-blue-700 active:scale-[0.98]";
                bookBtn.disabled = false;
            } else {
                container.innerHTML = `
                    <div class="text-gray-400 text-center text-sm font-medium">
                        좌석을 선택해주세요<br/>(최대 1석)
                    </div>
                `;
                bookBtn.className = "w-full py-4 rounded-lg text-lg font-bold transition-colors shadow-md bg-gray-300 text-gray-500 cursor-not-allowed";
                bookBtn.disabled = true;
            }
        }

        function startBots() {
            if (state.botInterval) clearInterval(state.botInterval);
            
            const speed = state.difficulty === 'EASY' ? 800 : state.difficulty === 'NORMAL' ? 300 : 100;
            const count = state.difficulty === 'EASY' ? 1 : state.difficulty === 'NORMAL' ? 3 : 8;

            state.botInterval = setInterval(() => {
                let availableSeats = state.seats.filter(s => s.status === 'AVAILABLE');
                if (availableSeats.length === 0) return;

                let takenByBotThisRound = false;

                for (let i = 0; i < count; i++) {
                    if (availableSeats.length === 0) break;
                    
                    const randIndex = Math.floor(Math.random() * availableSeats.length);
                    const target = availableSeats[randIndex];
                    
                    // Mark as taken
                    target.status = 'TAKEN';
                    updateSingleSeatClass(target.id);
                    
                    // Remove from local available array to prevent taking it again in same loop
                    availableSeats.splice(randIndex, 1);

                    // Check if bot stole user's seat
                    if (state.selectedSeatId === target.id) {
                        state.selectedSeatId = null;
                        updateSelectedSeatUI();
                        takenByBotThisRound = true;
                    }
                }

                if (takenByBotThisRound) {
                    showModal("이선좌\n이미 선택된 좌석입니다.");
                }
            }, speed);
        }

        function stopBots() {
            if (state.botInterval) clearInterval(state.botInterval);
        }

        function bookSeat() {
            if (!state.selectedSeatId) {
                showModal("좌석을 선택해주세요.");
                return;
            }
            
            // Final server check simulation
            const seat = state.seats.find(s => s.id === state.selectedSeatId);
            if (seat.status === 'TAKEN') {
                state.selectedSeatId = null;
                updateSelectedSeatUI();
                showModal("이선좌\n결제 진행 중 다른 고객이 먼저 선택한 좌석입니다.");
                return;
            }

            stopBots();
            stopGlobalTimer();
            
            // Setup Success Screen
            document.getElementById('final-time').innerText = formatTime(state.elapsedTime);
            
            let diffText = '보통맛 🎫';
            if (state.difficulty === 'HARD') diffText = '매운맛 🌶️';
            else if (state.difficulty === 'EASY') diffText = '순한맛 😌';
            document.getElementById('final-difficulty').innerText = `난이도 : ${diffText}`;

            switchStep('step-success');
        }

        function resetApp() {
            stopBots();
            stopGlobalTimer();
            state.elapsedTime = 0;
            switchStep('step-home');
        }

    </script>
</body>
</html>
